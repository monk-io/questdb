# cargo-deny configuration for license compliance
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally:
#   cargo deny check licenses    # check license compatibility
#   cargo deny check advisories  # check for known vulnerabilities
#   cargo deny list --layout license  # list all dependency licenses

[graph]
all-features = false
no-default-features = false

[advisories]
# qdb-sqllogictest is a test-only tool, not shipped in production. It connects
# only to the local QuestDB instance under test, never to an untrusted server.
# The ignored advisories are either transitive deps of older crates not worth
# upgrading in a test harness, or client-side vulnerabilities that an attacker
# can only trigger from a malicious or man-in-the-middle postgres server. The
# patched postgres crates also pull in a large transitive bump (rand 0.10,
# getrandom 0.4, wit-bindgen) that conflicts with the locked tree.
ignore = [
    { id = "RUSTSEC-2025-0056", reason = "adler is a transitive dep of tokio/backtrace, test-only" },
    { id = "RUSTSEC-2025-0023", reason = "tokio broadcast channel unsoundness, not used in test harness" },
    { id = "RUSTSEC-2026-0178", reason = "tokio-postgres DataRow panic; needs a malicious server, harness only talks to the trusted local QuestDB under test" },
    { id = "RUSTSEC-2026-0179", reason = "postgres-protocol unbounded SCRAM iterations; needs a malicious or MITM server, harness only talks to the trusted local QuestDB under test" },
    { id = "RUSTSEC-2026-0180", reason = "postgres-protocol hstore decode panic; needs a malicious server, harness only talks to the trusted local QuestDB under test" },
]

[licenses]
# Licenses compatible with Apache-2.0 redistribution.
# This allow-list includes only licenses that permit redistribution
# under the Apache License 2.0 without additional obligations
# that conflict with Apache-2.0 terms.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "OpenSSL",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

# Ring uses a non-standard license file. This clarification tells cargo-deny
# how to interpret it. The hash must match the actual LICENSE file contents;
# if ring updates its LICENSE, this hash will need updating.
#[[licenses.clarify]]
#crate = "ring"
#expression = "MIT AND ISC AND OpenSSL"
#license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
